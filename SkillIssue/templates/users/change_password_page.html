{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>Skill Issue - Смена пароля</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    {% include 'users/_styles_core.html' %}
</head>
<body>
    {% include 'users/header.html' %}

    <div class="register_container">
        <form id="change_password_form" style="margin: auto; margin-top: 40px;" class="register_panel" novalidate>
            <p class="simple-text" style="margin: auto; font-size: 2rem" data-lang-ru="Смена пароля" data-lang-en="Change password">Смена пароля</p>
            <p class="simple-text" style="margin: auto; margin-top: -20px; font-size: 1rem" data-lang-ru="Введите старый пароль и придумайте новый" data-lang-en="Enter old password and create a new one">Введите старый пароль и придумайте новый</p>

            <input class="register_input" type="password" id="old_password" placeholder="введите старый пароль" style="margin: auto"
                   data-placeholder-ru="введите старый пароль" data-placeholder-en="enter old password">
            <input class="register_input" type="password" id="new_password" placeholder="введите новый пароль" style="margin: auto"
                   data-placeholder-ru="введите новый пароль" data-placeholder-en="enter new password">
            <input class="register_input" type="password" id="confirm_password" placeholder="повторите новый пароль" style="margin: auto"
                   data-placeholder-ru="повторите новый пароль" data-placeholder-en="confirm new password">

            <div style="height: 20px; margin-top: -30px; margin-bottom: -20px">
                <p id="password_error" class="simple-text" style="font-size:0.8rem; color: red;"></p>
            </div>

            <button type="submit" class="register_button" data-lang-ru="Сменить пароль" data-lang-en="Change password">Сменить пароль</button>
        </form>
    </div>

    {% include 'users/footer.html' %}

    <script src="{% static 'js/toggle_language.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('change_password_form');
        const oldPasswordInput = document.getElementById('old_password');
        const newPasswordInput = document.getElementById('new_password');
        const confirmPasswordInput = document.getElementById('confirm_password');
        const errorText = document.getElementById('password_error');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            errorText.textContent = '';
            errorText.style.color = 'red';

            const oldPassword = oldPasswordInput.value.trim();
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            // Проверка заполнения всех полей
            if (!oldPassword || !newPassword || !confirmPassword) {
                errorText.textContent = "Заполните все поля";
                return;
            }

            // Проверка длины нового пароля
            if (newPassword.length < 8) {
                errorText.textContent = "Новый пароль должен содержать минимум 8 символов";
                return;
            }

            // Проверка совпадения паролей
            if (newPassword !== confirmPassword) {
                errorText.textContent = "Новые пароли не совпадают";
                return;
            }

            // Отправка запроса на сервер
            fetch('/api/auth/change-password/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    old_password: oldPassword,
                    new_password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorText.textContent = data.error;
                    return;
                }

                // Успешно
                errorText.style.color = 'green';
                errorText.textContent = "Пароль успешно изменен! Перенаправление...";

                setTimeout(() => {
                    window.location.href = '/login-page/';
                }, 1500);
            })
            .catch(error => {
                errorText.textContent = "Ошибка сети. Попробуйте позже.";
                console.error('Error:', error);
            });
        });

        // Функция для получения CSRF токена
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    });
    </script>
</body>
</html>
