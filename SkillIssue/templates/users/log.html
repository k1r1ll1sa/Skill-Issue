{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>Skill Issue</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    {% include 'users/header.html' %}

    <div class="register_container">
        <form id="login_form" style="margin: auto; margin-top: 40px;" class="register_panel" novalidate>
            <p class="simple-text" style="margin: auto; font-size: 2rem" data-lang-ru="Уже зарегистрированы?" data-lang-en="Already registered?">Уже зарегистрированы?</p>
            <p class="simple-text" style="margin: auto; margin-top: -20px; font-size: 1rem" data-lang-ru="Напомните, кто вы?" data-lang-en="Remind us who you are?">Напомните, кто вы?</p>

            <input class="register_input" type="text" id="login_username" placeholder="введите username" style="margin: auto"
                   data-placeholder-ru="введите username" data-placeholder-en="enter username">
            <input class="register_input" type="password" id="login_password" placeholder="введите пароль" style="margin: auto"
                   data-placeholder-ru="введите пароль" data-placeholder-en="enter password">

            <div style="height: 20px; margin-top: -30px; margin-bottom: -20px">
                <p id="login_error" class="simple-text" style="font-size:0.8rem"></p>
            </div>

            <button type="submit" class="register_button" data-lang-ru="войти" data-lang-en="log in">войти</button>
            <a href="{% url 'register_page' %}" class="simple-text" style="color: dimgray; font-size: 1rem; margin-top: -20px" data-lang-ru="зарегистрироваться" data-lang-en="register">зарегистрироваться</a>
            <a href="{% url 'reset_password_page' %}" class="simple-text" style="color: dimgray; font-size: 1rem; margin-top: -20px" data-lang-ru="забыли пароль?" data-lang-en="forgot your password?">забыли пароль?</a>
        </form>
    </div>

    {% include 'users/footer.html' %}
</body>

<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/toggle_language.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('login_form');
    const usernameInput = document.getElementById('login_username');
    const passwordInput = document.getElementById('login_password');
    const error_par = document.getElementById('login_error');

    if (!loginForm) return;

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            error_par.textContent = "Заполните все поля";
            return;
        }

        error_par.textContent = '';

        fetch("/api/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({username, password}),
            credentials: "include"
        })
        .then(async res => {
            // ✅ ОБРАБОТКА БЛОКИРОВКИ (403)
            if (res.status === 403) {
                const data = await res.json();
                // Перенаправляем на страницу блокировки
                window.location.href = '/blocked/';
                return;
            }

            if (!res.ok) {
                return res.json().then(data => {
                    throw new Error(data.error || `Ошибка ${res.status}`);
                });
            }
            return res.json();
        })
        .then(data => {
            // Если был 403, data будет undefined — просто выходим
            if (!data) return;

            if (data.access && data.refresh) {
                authManager.setTokens(data.access, data.refresh, {
                    username: data.username,
                    email: data.email
                });
                window.location.href = "{% url 'main_page' %}";
            } else {
                error_par.textContent = "Неожиданный ответ от сервера";
            }
        })
        .catch(err => {
            console.error(err);
            error_par.textContent = err.message || "Ошибка сервера";
        });
    });
});
</script>
<script src="{% static 'js/search.js' %}"></script>
<script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
