{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Issue</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    {% include 'users/_styles_core.html' %}
</head>
<body>
    {% include 'users/header.html' %}

    <div class="register_container auth-page">
        <form id="recovery_form" class="register_panel auth-form" novalidate>
            <p class="simple-text auth-title" data-lang-ru="Восстановление пароля" data-lang-en="Password recovery">Восстановление пароля</p>
            <p class="simple-text auth-subtitle" data-lang-ru="Мы выслали код для восстановления на вашу почту" data-lang-en="We have sent a recovery code to your email">Мы выслали код для восстановления на вашу почту</p>

            <input class="register_input" type="email" id="email" placeholder="введите почту"
                   data-placeholder-ru="введите почту" data-placeholder-en="enter Email">
            <input class="register_input" type="text" id="email_code" placeholder="введите код из Email"
                   data-placeholder-ru="введите код из Email" data-placeholder-en="enter Email code">
            <input class="register_input" type="password" id="new_password" placeholder="введите новый пароль"
                   data-placeholder-ru="введите новый пароль" data-placeholder-en="enter new password">

            <div class="auth-error-slot">
                <p id="recovery_error" class="simple-text"></p>
            </div>

            <button type="submit" id="action_button" class="register_button" data-lang-ru="Прислать код" data-lang-en="Send code">Прислать код</button>
        </form>
    </div>

    {% include 'users/footer.html' %}
</body>

<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/toggle_language.js' %}"></script>
<script src="{% static 'js/search.js' %}"></script>
<script src="{% static 'js/theme.js' %}"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('recovery_form');
    const emailInput = document.getElementById('email');
    const codeInput = document.getElementById('email_code');
    const passwordInput = document.getElementById('new_password');
    const actionButton = document.getElementById('action_button');
    const errorText = document.getElementById('recovery_error');

    // Состояние: 'send_code' или 'change_password'
    let currentState = 'send_code';

    // Простая проверка email
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        errorText.textContent = '';
        errorText.style.color = 'red';

        if (currentState === 'send_code') {
            // Шаг 1: Отправка кода
            const email = emailInput.value.trim();

            if (!email) {
                errorText.textContent = "Введите email";
                return;
            }

            if (!isValidEmail(email)) {
                errorText.textContent = "Некорректный формат email";
                return;
            }

            // Отправляем запрос на сервер для проверки email и отправки кода
            fetch('/api/auth/password-reset/request/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorText.textContent = data.error;
                    return;
                }

                // Успешно - переключаем состояние
                currentState = 'change_password';
                actionButton.textContent = "Сменить пароль";
                actionButton.setAttribute('data-lang-ru', 'Сменить пароль');
                actionButton.setAttribute('data-lang-en', 'Change password');

                errorText.style.color = 'green';
                errorText.textContent = "Код отправлен! Проверьте консоль (для разработки)";

                // Блокируем поле email, чтобы не меняли
                emailInput.disabled = true;
                codeInput.focus();
            })
            .catch(error => {
                errorText.textContent = "Ошибка сети. Попробуйте позже.";
                console.error('Error:', error);
            });

        } else if (currentState === 'change_password') {
            // Шаг 2: Смена пароля
            const email = emailInput.value.trim();
            const code = codeInput.value.trim();
            const newPassword = passwordInput.value.trim();

            if (!email || !code || !newPassword) {
                errorText.textContent = "Заполните все поля";
                return;
            }

            if (newPassword.length < 8) {
                errorText.textContent = "Пароль должен содержать минимум 8 символов";
                return;
            }

            // Отправляем запрос на смену пароля
            fetch('/api/auth/password-reset/confirm/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    email: email,
                    code: code,
                    new_password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorText.textContent = data.error;
                    return;
                }

                // Успешно - перенаправляем на страницу входа
                errorText.style.color = 'green';
                errorText.textContent = "Пароль успешно изменен! Перенаправление...";

                setTimeout(() => {
                    window.location.href = '/login-page/';  // ИСПРАВЛЕНО: было /login/
                }, 1500);
            })
            .catch(error => {
                errorText.textContent = "Ошибка сети. Попробуйте позже.";
                console.error('Error:', error);
            });
        }
    });

    // Функция для получения CSRF токена
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
</body>
</html>
