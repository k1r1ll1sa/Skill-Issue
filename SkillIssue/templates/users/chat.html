{% load static %}
<button type="button" id="floating-button" title="Открыть чат">
    💬
    <span class="chat-badge" id="chat-unread-badge"></span>
</button>

<div id="chat-modal">
    <div id="chat-contacts">
        <div id="chat-header">
            <div class="chat-header-left">
                <span>Сообщения</span>
                <span class="chat-header-badge" id="chat-header-badge"></span>
            </div>
            <div class="chat-header-actions">
                <button id="btn-mark-all-read" title="Прочитать всё">&#10003;&#10003;</button>
                <button id="btn-mute-notifications" title="Выключить уведомления">&#128276;</button>
                <button id="chat-close-button" title="Закрыть">&times;</button>
            </div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="chat-dialog">
        <div id="dialog-header">
            <button id="back-to-chats">&lsaquo;</button>
            <img id="dialog-avatar" src="{% static 'images/default-avatar.jpg' %}" alt="Avatar">
            <div class="dialog-user-info">
                <a id="profile-link" href="#">Никнейм</a>
            </div>
        </div>

        <div id="messages-container"></div>

        <div id="chat-input-area">
            <div id="image-preview-container">
                <img id="image-preview" src="" alt="Предпросмотр">
                <button id="remove-image" type="button">&times;</button>
            </div>
            <input type="file" id="image-upload" accept="image/png, image/jpeg, image/jpg">

            <form id="message-form">
                <button type="button" id="attach-button" title="Прикрепить файл">&#128206;</button>
                <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
                <button type="submit" title="Отправить">&#8629;</button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const muteBtn = document.getElementById('btn-mute-notifications');
    const badge = document.getElementById('chat-unread-badge');
    const STORAGE_KEY = 'chat_notifications_muted';

    let isMuted = localStorage.getItem(STORAGE_KEY) === 'true';
    applyMuteState(isMuted);

    if (muteBtn) {
        muteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isMuted = !isMuted;
            localStorage.setItem(STORAGE_KEY, isMuted);
            applyMuteState(isMuted);

            if (!isMuted && window.lastUnreadCount > 0) {
                window.updateChatBadge(window.lastUnreadCount);
            }
        });
    }

    function applyMuteState(muted) {
        if (muted) {
            muteBtn?.classList.add('is-muted');
            muteBtn?.setAttribute('title', 'Включить уведомления');
            if (badge) badge.style.display = 'none';
        } else {
            muteBtn?.classList.remove('is-muted');
            muteBtn?.setAttribute('title', 'Отключить уведомления');
        }
    }

    window.updateChatBadge = function(unreadCount) {
        window.lastUnreadCount = unreadCount;
        if (!badge) return;

        if (isMuted) {
            badge.style.display = 'none';
            badge.textContent = '';
            return;
        }

        if (unreadCount > 0) {
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
            badge.textContent = '';
        }
    };
});
</script>
